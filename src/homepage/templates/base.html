<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Hekkie{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0c0c14;
      --surface: #13131f;
      --surface2: #1c1c2e;
      --border: #2a2a40;
      --accent: #c51a8a;
      --accent2: #7c3aed;
      --accent-glow: rgba(197,26,138,0.12);
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #10b981;
      --blue: #3b82f6;
      --yellow: #f59e0b;
      --red: #ef4444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      line-height: 1.6;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }
    body::after {
      content: '';
      position: fixed;
      top: -200px; left: -200px;
      width: 700px; height: 700px;
      background: radial-gradient(circle, rgba(197,26,138,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(12,12,20,0.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    .nav-inner {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0;
      height: 52px;
    }
    .nav-logo {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--accent);
      text-decoration: none;
      margin-right: 32px;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 2px;
      flex: 1;
    }
    .nav-link {
      font-size: 0.85rem;
      color: var(--muted);
      text-decoration: none;
      padding: 6px 10px;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
      white-space: nowrap;
    }
    .nav-link:hover { color: var(--text); background: var(--surface2); }
    .nav-link.active {
      color: var(--accent);
      background: var(--accent-glow);
    }
    .nav-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }
    .status-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes pulse {
      0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(16,185,129,.4); }
      50% { opacity:.7; box-shadow:0 0 0 5px rgba(16,185,129,0); }
    }
    .nav-status {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--muted);
    }
    @media (max-width: 600px) {
      nav { padding: 0 12px; }
      .nav-inner { height: auto; flex-wrap: wrap; padding: 8px 0; gap: 0; }
      .nav-logo { margin-right: 8px; padding: 6px 0; }
      .nav-links {
        flex: 0 0 100%;
        overflow-x: auto;
        flex-wrap: nowrap;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-bottom: 4px;
        gap: 0;
      }
      .nav-links::-webkit-scrollbar { display: none; }
      .nav-link { padding: 6px 10px; font-size: 0.82rem; flex-shrink: 0; }
      .nav-right { display: none; }
    }

    /* ── PAGE ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 40px 24px 80px;
    }

    /* ── SHARED COMPONENTS ── */
    .section-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    }
    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px var(--accent-glow), 0 8px 32px rgba(0,0,0,.3);
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-family: var(--mono);
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.72rem;
      font-family: var(--mono);
      font-weight: 500;
    }

    /* ── PAGE HEADER ── */
    .page-header {
      margin-bottom: 40px;
    }
    .page-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #fff 40%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }
    .page-header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ── STAT CARDS ROW ── */
    .stat-row {
      display: flex;
      gap: 12px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .stat-box {
      flex: 1;
      min-width: 120px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
    }
    .stat-box .label {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .stat-box .value {
      font-size: clamp(1.1rem, 4vw, 1.6rem);
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }
    .stat-box .sub {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 28px;
      margin-top: 40px;
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    footer .left {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--muted);
    }
    footer .left span { color: var(--accent); }
    footer .right {
      font-size: 0.78rem;
      color: var(--muted);
      font-style: italic;
    }

    /* ── TABLE ── */
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 320px;
    }
    .data-table th {
      font-family: var(--mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .data-table td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(42,42,64,0.5);
      color: var(--text);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(255,255,255,0.02); }
    .rank-1 { color: #fbbf24; font-weight: 700; }
    .rank-2 { color: #94a3b8; font-weight: 600; }
    .rank-3 { color: #cd7c49; font-weight: 600; }

    {% block extra_style %}{% endblock %}
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="/">//hekkie</a>
    <div class="nav-links">
      <a class="nav-link {% if active=='home' %}active{% endif %}" href="/">Home</a>
      <a class="nav-link {% if active=='activities' %}active{% endif %}" href="/activities">Activities</a>
      <a class="nav-link {% if active=='koms' %}active{% endif %}" href="/koms">KOMs</a>
      <a class="nav-link {% if active=='github' %}active{% endif %}" href="/github">GitHub</a>
      <a class="nav-link {% if active=='calendar' %}active{% endif %}" href="/calendar">Calendar</a>
      <a class="nav-link {% if active=='picnic' %}active{% endif %}" href="/picnic">Picnic</a>
    </div>
    <div class="nav-right">
      <span class="status-dot"></span>
      <span class="nav-status">raspberrypi · online</span>
    </div>
  </div>
</nav>

<div class="page">
  {% block content %}{% endblock %}
</div>

<div class="page" style="padding-top:0">
  <footer>
    <div class="left">running on <span>Raspberry Pi 5</span> · arm64</div>
    <div class="right">"I don't sleep. I just wait."</div>
  </footer>
</div>
</body>
</html>
